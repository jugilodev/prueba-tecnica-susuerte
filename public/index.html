<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Gestión de Tiquetes</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <h1>Registro de Tiquetes</h1>

    <form id="ticketForm">

        <div>
            <label>Usuario ID</label>
            <input type="number" id="usuario_id" required>
        </div>

        <div>
            <label>Monto</label>
            <input type="number" id="monto" step="0.01" required>
        </div>

        <button type="submit">
            Crear Tiquete
        </button>

    </form>

    <div id="message"></div>

    <h2>Tiquetes creados</h2>

    <ul id="ticketList"></ul>

    <script src="app.js"></script>

</body>

</html>
